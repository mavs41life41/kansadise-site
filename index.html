<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kansadise</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4efe4;
      color: #1f3b2d;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    .logo {
      width: 220px;
      max-width: 80%;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .description {
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 1.1rem;
      padding: 0 20px;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <section class="hero">

    <img
      class="logo"
      src="E57AE685-5E51-4F84-9C20-D0B64B9061FF.png
      alt="Kansadise Logo"
    />

    <h1>KANSADISE</h1>

    <div class="tagline">
      Midwest hustle. Earned success. Timeless design.
    </div>

    <div class="description">
      Kansadise is a Kansas City-inspired lifestyle brand built around Midwest hustle, earned success, timeless design, and the feeling of finding paradise wherever you stand.
    </div>

  </section>

  <footer>
    © 2026 Kansadise KCMO
  </footer>

</body>
</html>
