<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kansadise</title>

  <style>
    :root {
      --cream: #f4efe4;
      --green: #1f3b2d;
      --gold: #9a7130;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #f7f2e8, #efe6d5);
      color: #111;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px 20px 60px;
      text-align: center;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .logo {
      width: 320px;
      max-width: 85%;
      margin: 20px auto 10px;
      display: block;
    }

    .badge {
      display: inline-block;
      background: var(--green);
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-top: 10px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 5rem;
      letter-spacing: 8px;
      color: var(--green);
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1.7rem;
      color: #333;
      max-width: 800px;
      margin: auto;
      line-height: 1.5;
      margin-bottom: 35px;
      font-weight: 600;
    }

    .description {
      max-width: 760px;
      margin: auto;
      font-size: 1.15rem;
      line-height: 2;
      color: #444;
    }

    .divider {
      width: 120px;
      height: 3px;
      background: var(--gold);
      margin: 40px auto;
      border-radius: 999px;
    }

    .footer {
      margin-top: 70px;
      color: #666;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    @media (max-width: 700px) {

      .top {
        font-size: 0.75rem;
      }

      h1 {
        font-size: 4rem;
      }

      .tagline {
        font-size: 1.2rem;
      }

      .description {
        font-size: 1rem;
        line-height: 1.8;
      }

      .logo {
        width: 260px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top">
      <div>Kansadise KCMO</div>
      <div>Est. 2026</div>
    </div>

    <img
      class="logo"
      src="E57AE685-5E51-4F84-9C20-D0B64B9061FF.png"
      alt="Kansadise Logo"
    >

    <div class="badge">
      COMING SOON
    </div>

    <h1>KANSADISE</h1>

    <div class="tagline">
      Midwest hustle. Earned success. Timeless design.
    </div>

    <div class="divider"></div>

    <div class="description">
      Kansadise is a Kansas City-inspired lifestyle brand built around Midwest hustle, earned success, timeless design, and the feeling of finding paradise wherever you stand.
    </div>

    <div class="footer">
      © 2026 Kansadise KCMO
    </div>

  </div>

</body>
</html>
